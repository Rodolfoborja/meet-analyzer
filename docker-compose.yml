version: '3.8'

# MeetAnalyzer - Docker Compose
# PostgreSQL se crea externamente en Dokploy

services:
  backend:
    build: ./backend
    container_name: meetanalyzer-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - BACKEND_URL=${BACKEND_URL}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - REDIS_URL=${REDIS_URL}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - meetanalyzer-network

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=${BACKEND_URL}
    container_name: meetanalyzer-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${BACKEND_URL}
    depends_on:
      - backend
    networks:
      - meetanalyzer-network

  # Redis opcional para jobs en background
  redis:
    image: redis:7-alpine
    container_name: meetanalyzer-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - meetanalyzer-network

volumes:
  uploads_data:
  redis_data:

networks:
  meetanalyzer-network:
    driver: bridge
