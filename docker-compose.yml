version: '3.8'

services:
  app:
    build: .
    container_name: meetanalyzer-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://meetanalyzer:${DB_PASSWORD}@postgres:5432/meetanalyzer
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meetanalyzer-network

  postgres:
    image: postgres:15-alpine
    container_name: meetanalyzer-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=meetanalyzer
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=meetanalyzer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetanalyzer"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - meetanalyzer-network

  redis:
    image: redis:7-alpine
    container_name: meetanalyzer-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - meetanalyzer-network

  # MinIO para almacenamiento de archivos (opcional)
  minio:
    image: minio/minio
    container_name: meetanalyzer-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-changeme123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - meetanalyzer-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  meetanalyzer-network:
    driver: bridge
